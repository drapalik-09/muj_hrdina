<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Rychlý styl pro chybovou hlášku (můžeš si přesunout do style.css) */
        .chyba-text {
            color: #ff4500;
            font-size: 14px;
            margin: -5px 0 15px 0;
            display: none; /* Schované, dokud nevznikne chyba */
            text-align: left;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <img class="baner" src="img/ChatGPT Image 27. 5. 2026 21_09_12.png" alt="Kočičí válečníci banner s motivem fantasy série">
    </header>
    <nav class="menu">
        <ul>
            <li><a href="#" id="back-link">Zpět</a></li>
        </ul>
    </nav>
    <main class="login-container">
        <form id="login-form" method="get" action="onsubmit">
            <h1 class="nadpis">Přihlášení</h1>
            <label for="username" class="form-label">Zadejte uživatelské jméno:</label>
            <input type="text" id="username" placeholder="Uživatelské jméno" required class="formular-okno">
            <label for="email" class="form-label">E-mail:</label>
            <input type="email" id="email" name="email"  required class="formular-okno">            
            <label for="gander" class="form-label">Pohlaví:</label>

            <div class="button-container">
                <div>
                    <input type="radio" name="gander" id="muz" value="muž">
                    <label for="muz">Muž</label>
                </div>
                <div>
                    <input type="radio" name="gander" id="zena" value="žena">
                    <label for="zena">Žena</label>
                </div>
                <div>
                    <input type="radio" name="gander" id="kocour" value="kocour">
                    <label for="kocour">Kocour</label>
                </div>                
                <div>
                    <input type="radio" name="gander" id="kocka" value="kočka">
                    <label for="kocka">Kočka</label>
                </div>

            </div>
            <label for="heslo" class="form-label">Zadejte heslo:</label>
            <input type="password" id="heslo" placeholder="Heslo" required class="formular-okno">
            <label for="heslo-potvrzeni" class="form-label">Potvrďte heslo:</label>
            <input type="password" id="heslo-potvrzeni" placeholder="Heslo znovu" required class="formular-okno">
            
            <p id="chyba-heslo" class="chyba-text">Hesla se neshodují!</p>

            <div class="button-container">
                <button type="submit">Přihlásit se</button>
                <button type="button" id="back-linkk">Zpět</button>
            </div>
        </form>
    </main>


    <script src="script.js"></script>
    </body>
</html>
